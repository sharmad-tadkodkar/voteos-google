<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOTE OS - Civic Operating System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            900: '#f8fafc', // slate-50 (Main background)
                            800: '#ffffff', // white (Cards, surfaces)
                            700: '#e2e8f0', // slate-200 (Borders, dividers)
                            accent: '#10b981', // emerald-500 (XP/Success)
                            primary: '#6366f1', // indigo-500 (AI/Tech)
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        wicky: ['Anton', 'sans-serif'], // Added for the bold poster text
                    },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-8px)' },
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
        <style>
        body {
            background-color: #f8fafc;
            color: #0f172a;
            margin: 0;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        /* Custom Scrollbar for a sleeker look */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f8fafc;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.js"></script></body>
</html>
